---
- name: Ensure config dir exists
  ansible.builtin.file:
    path: "/etc/containers/systemd/ntfy/config"
    state: directory
    mode: "0750"

- name: Add ntfy config files
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/containers/systemd/ntfy/{{ item }}"
    mode: "0640"
  with_items:
    - podman-ntfy.container
    - ntfy.volume
  notify: "Restart ntfy"

- name: Reload systemd units
  ansible.builtin.systemd:
    daemon_reload: true
